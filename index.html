<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Keuangan Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm mb-4">
                    <div class="card-body text-center">
                        <h2 class="card-title mb-4">Dompet Digital</h2>
                        <div class="mb-4">
                            <h6 class="text-muted text-uppercase small">Saldo Anda</h6>
                            <h1 id="balance" class="display-5 fw-bold">Rp 0</h1>
                        </div>

                        <div class="row g-2">
                            <div class="col-6 border-end">
                                <h6 class="small text-muted">Pemasukan</h6>
                                <p id="money-plus" class="text-success fw-bold mb-0">+Rp 0</p>
                            </div>
                            <div class="col-6">
                                <h6 class="small text-muted">Pengeluaran</h6>
                                <p id="money-minus" class="text-danger fw-bold mb-0">-Rp 0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Tambah Transaksi Baru</h5>
                        <form id="form">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Deskripsi</label>
                                <input type="text" id="text" class="form-control" placeholder="Misal: Gaji, PC Cooler..." required />
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Jumlah (+ Masuk, - Keluar)</label>
                                <input type="number" id="amount" class="form-control" placeholder="Contoh: 500000 atau -150000" required />
                            </div>
                            <div class="d-grid gap-2">
                                <button class="btn btn-primary">Tambah Transaksi</button>
                                <button type="button" class="btn btn-outline-success btn-sm" onclick="downloadJSON()">Unduh Backup (.json)</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Riwayat Transaksi</h5>
                        <ul id="list" class="list-group list-group-flush mb-3">
                            </ul>
                        
                        <div class="mt-4 p-3 border rounded border-dashed text-center bg-white">
                            <label for="importFile" class="form-label small fw-bold d-block">Import Backup Data</label>
                            <input type="file" id="importFile" class="form-control form-control-sm" accept=".json" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
